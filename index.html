<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <!-- top header -->
   <div class="top-head">
    <div class="container">
      <div class="inner-wrap">
        <div class="top-head-item">
          <i class="fa-solid fa-phone"></i>
            0123.456.789
        </div>
        <div class="top-head-item">
          <i class="fa-solid fa-envelope"></i>
            nttruong@gmail.com
        </div>
        <div class="top-head-item">
          <i class="fa-solid fa-building"></i>
            218 Lĩnh nam
        </div>
      </div>
    </div>
   </div>
  <!-- end top header -->

  <!-- header -->
   <div class="header">
    <div class="container">
      <div class="inner-wrap">
        <a href="#" class="inner-logo">
          <img src="assets/images/logo-trang.png" alt="">
        </a>
        <div class="inner-search">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" placeholder="Bạn muốn mua gì...">
        </div>
        <div class="inner-login">
          <a href="#" class="inner-cart">
            <img src="assets/images/Icon.svg" alt="">
          </a>
          <a href="#" class="inner-info">
            <img src="assets/images/logo-trang.png" alt="" class="inner-image">
            <div class="inner-name">nttruong</div>
          </a>
        </div>
        <div class="inner-menu">
          <i class="fa-solid fa-bars"></i>
        </div>
      </div>
    </div>
   </div>
  <!-- end header -->

  <!-- list products -->
   <div class="section-1">
    <div class="container">
      <div class="inner-wrap">
        <h1 class="title">Danh sách sản phẩm</h1>
        <div class="product-list">
          <div class="box-product">
            <div class="inner-image">
              <img src="assets/images/logo-trang.png" alt="">
            </div>
            <div class="inner-discount">
              <i class="fa-solid fa-bolt-lightning"></i>
              Giảm -10%
            </div>
            <div class="inner-content">
              <div class="inner-name">Bút chì</div>
              <div class="inner-price">
                <div class="inner-price-old">10.000<span>đ</span></div>
                <div class="inner-price-new">9.000<span>đ</span></div>
              </div>
              <div class="inner-footer">
                <div class="inner-cart">
                  <img src="assets/images/Icon.svg" alt="">
                  Giỏ hàng
                </div>
                <div class="inner-quantity">
                  <div class="inner-label">
                    Còn lại: 
                  </div>
                  <div class="inner-num">
                    10
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
   </div>
  <!-- end list products -->

  <!-- menu ẩn -->
  <div class="hide-menu">
    <div class="inner-wrap">
      <ul>
        <li>
          <a href="">
            Liên hệ
          </a>
        </li>
        <li>
          <a href="">
            Đăng nhập
          </a>
        </li>
      </ul>
    </div>
  </div>
  <!-- hết menu ẩn -->

  <!-- contact -->
  <div class="contact">
    <a href="" target="_blank">
      <i class="fa-solid fa-comment-dots"></i>
    </a>
    
  </div>
  <!-- end contact -->

  <!-- banner -->
  <div class="section-2">
    <div class="container">
      <div class="inner-image">
        <a href="">
          <img src="assets/images/banner-2.webp" alt="">
        </a>
      </div>
    </div>
  </div>
  <!-- end banner -->

  <!-- list products 2 -->
   <div class="section-1">
    <div class="container">
      <div class="inner-wrap">
        <h1 class="title">Danh sách sản phẩm</h1>
        <div class="product-list">
          <div class="box-product">
            <div class="inner-image">
              <img src="assets/images/logo-trang.png" alt="">
            </div>
            <div class="inner-discount">
              <i class="fa-solid fa-bolt-lightning"></i>
              Giảm -10%
            </div>
            <div class="inner-content">
              <div class="inner-name">Bút chì</div>
              <div class="inner-price">
                <div class="inner-price-old">10.000<span>đ</span></div>
                <div class="inner-price-new">9.000<span>đ</span></div>
              </div>
              <div class="inner-footer">
                <div class="inner-cart">
                  <img src="assets/images/Icon.svg" alt="">
                  Giỏ hàng
                </div>
                <div class="inner-quantity">
                  <div class="inner-label">
                    Còn lại: 
                  </div>
                  <div class="inner-num">
                    10
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
   </div>
  <!-- end list products -->

  <script src="assets/js/javascript-1.js"></script>
</body>
</html>
