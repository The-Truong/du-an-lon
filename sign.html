<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/css/style.css">
  <title>Đăng ký</title>
</head>

<body>
  <div class="page-sign">
    <div class="form-account">
      <h1 class="inner-title">Đăng ký</h1>
      <div class="inner-desc">Tạo một tài khoản để tiếp tục</div>
      <form class="inner-form">
        <div class="inner-group">
          <label for="" class="inner-label">Họ tên</label>
          <input type="text" name="" id="" placeholder="Nhập tên của bạn">
        </div>
        <div class="inner-group">
          <label for="" class="inner-label">Tên đăng nhập</label>
          <input type="text" name="" id="" placeholder="Nhập tên đăng nhập">
        </div>
        <div class="inner-group">
          <label for="" class="inner-label">Email</label>
          <input type="email" name="" id="" placeholder="Nhập email của bạn">
        </div>
        <div class="inner-group">
          <label for="" class="inner-label">Số điện thoại</label>
          <input type="text" name="" id="" placeholder="Nhập số điện thoại của bạn">
        </div>
        <div class="inner-group">
          <label for="" class="inner-label">Địa chỉ</label>
          <input type="text" name="" id="" placeholder="Nhập địa chỉ của bạn">
        </div>
        <div class="inner-group">
          <label for="" class="inner-label">Mật khẩu</label>
          <input type="password" name="" id="">
        </div>
        <div class="inner-group">
          <label for="" class="inner-label">Nhập lại mật khẩu</label>
          <input type="password" name="" id="">
        </div>
        <div class="inner-action">
          <div class="inner-remember">
            <input type="checkbox">
            <label for="">Tôi chấp nhận các điều khoản và điều kiện</label>
          </div>
        </div>
        <button>
          Đăng Ký
        </button>
      </form>
      <div class="inner-footer">
        Bạn đã có tài khoản?
        <a href="">Đăng nhập</a>
      </div>
    </div>
  </div>
</body>

</html>
