<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/css/style.css">
  <title>Document</title>
</head>

<body>
  <div class="page-account">
    <div class="form-account">
      <h1 class="inner-title">Đăng nhập</h1>
      <div class="inner-desc">Vui lòng nhập email và mật khẩu để tiếp tục</div>
      <form class="inner-form">
        <div class="inner-group">
          <label for="" class="inner-label">Email</label>
          <input type="email" name="" id="" placeholder="Nhập email của bạn">
        </div>
        <div class="inner-group">
          <label for="" class="inner-label">Mật khẩu</label>
          <input type="password" name="" id="">
        </div>
        <div class="inner-action">
          <div class="inner-remember">
            <input type="checkbox">
            <label for="">Nhớ mật khẩu</label>
          </div>
          <a href="#">Quên mật khẩu?</a>
        </div>
        <button>
          Đăng Nhập
        </button>
      </form>
      <div class="inner-footer">
        Bạn chưa có tài khoản?
        <a href="">Tạo tài khoản</a>
      </div>
    </div>
  </div>
</body>

</html>
